// ── PLAYER STATE ────────────────────────────────────────────
let PLAYER = null;

const SaveManager = {
  KEY: 'xstellar_swarm_v7',
  OLD_KEYS: ['xstellar_swarm_v6', 'xstellar_swarm_v5'],
  migrate() {
    try {
      if (localStorage.getItem(this.KEY) !== null) return;
      for (const ok of this.OLD_KEYS) {
        const old = localStorage.getItem(ok);
        if (old) { localStorage.setItem(this.KEY, old); localStorage.removeItem(ok); return; }
      }
    } catch {}
  },
  hasSave() { this.migrate(); try { return localStorage.getItem(this.KEY) !== null; } catch { return false; } },
  save() {
    if (!PLAYER) return;
    try { localStorage.setItem(this.KEY, JSON.stringify({
      v: 3, classKey: PLAYER.classKey, level: PLAYER.level, xp: PLAYER.xp,
      statPoints: PLAYER.statPoints, stats: PLAYER.stats,
      classSpecs: PLAYER.classSpecs, activeSpecial: PLAYER.activeSpecial,
      totalKills: PLAYER.totalKills, highestWave: PLAYER.highestWave,
      runs: PLAYER.runs, savedAt: Date.now()
    })); } catch(e) { console.warn('Save failed:', e); }
  },
  load() { this.migrate(); try { const r = localStorage.getItem(this.KEY); return r ? JSON.parse(r) : null; } catch { return null; } },
  clear() { try { localStorage.removeItem(this.KEY); } catch {} }
};

function createPlayer(classKey) {
  const c = CLASSES[classKey];
  PLAYER = {
    classKey, className: c.name, color: c.color,
    level: 1, xp: 0, statPoints: 0,
    stats: { ...c.base },
    classSpecs: { ranger: 0, knight: 0, mage: 0, cleric: 0 },
    activeSpecial: null,
    totalKills: 0, wavesCleared: 0, highestWave: 0, runs: 0
  };
  SaveManager.save();
}

function loadPlayer() {
  const d = SaveManager.load();
  if (!d || !CLASSES[d.classKey]) return false;
  const c = CLASSES[d.classKey];
  // Merge class base under saved stats so stats added in newer versions (e.g. v7 per/luk)
  // get sane defaults instead of NaN.
  const mergedStats = { ...c.base, ...(d.stats || {}) };
  PLAYER = {
    classKey: d.classKey, className: c.name, color: c.color,
    level: d.level || 1, xp: d.xp || 0, statPoints: d.statPoints || 0,
    stats: mergedStats,
    classSpecs: d.classSpecs || { ranger: 0, knight: 0, mage: 0, cleric: 0 },
    activeSpecial: d.activeSpecial || null,
    totalKills: d.totalKills || 0, wavesCleared: 0,
    highestWave: d.highestWave || 0, runs: d.runs || 0
  };
  return true;
}

function getMaxHP()     { return PLAYER.stats.fort * 5 + 20; }
function getDamage()    { return Math.max(1, 1 + PLAYER.stats.might - PLAYER.stats.haste * 0.5); }
function getMoveSpeed() { return Math.max(60, 120 + PLAYER.stats.agil * 15 - PLAYER.stats.armor * 3); }
function getFireDelay() { return Math.max(80, 400 - PLAYER.stats.haste * 30); }
function getArmor()     { return Math.min(0.75, PLAYER.stats.armor * 0.02); }
function getCritChance(){ return Math.min(0.5, (PLAYER.stats.per || 0) * 0.01); }
function getCritDmg()   { return 2.0 + (PLAYER.stats.luk || 0) * 0.05; }

// Combo pierce: combat resource derived from kill streak
// Pairs with mouse aim (line up enemies) and Volley (cone clears)
function comboPierceFor(combo) {
  if (combo >= 15) return 3;
  if (combo >= 10) return 2;
  if (combo >= 5) return 1;
  return 0;
}

function getSpecLevel(specKey) { return PLAYER.classSpecs[specKey] || 0; }
function getSpecData(specKey) {
  const lv = getSpecLevel(specKey);
  if (lv <= 0) return null;
  const spec = CLASS_SPECS[specKey];
  return spec.levels[Math.min(lv - 1, spec.levels.length - 1)];
}
function getUnlockedSpecs() {
  return Object.keys(CLASS_SPECS).filter(k => getSpecLevel(k) > 0);
}

// ── ENVIRONMENT DRAWING ─────────────────────────────────────

function drawCastleWall(scene) {
  const g = scene.add.graphics().setDepth(0);
  const wallY = H - 100;
  g.fillStyle(PAL.dirt, 1); g.fillRect(0, wallY + 40, W, H - wallY);
  g.fillStyle(PAL.stone, 1); g.fillRect(0, wallY, W, 44);
  g.lineStyle(1, PAL.stoneDark, 0.4);
  for (let row = 0; row < 3; row++) {
    const ry = wallY + row * 15;
    g.moveTo(0, ry); g.lineTo(W, ry);
    const off = row % 2 === 0 ? 0 : 25;
    for (let bx = off; bx < W; bx += 50) { g.moveTo(bx, ry); g.lineTo(bx, ry + 15); }
  }
  g.strokePath();
  g.fillStyle(PAL.stone, 1);
  for (let bx = 0; bx < W; bx += 40) {
    g.fillRect(bx, wallY - 18, 22, 18);
    g.fillStyle(PAL.stoneDark, 0.3); g.fillRect(bx + 2, wallY - 16, 18, 1); g.fillRect(bx + 2, wallY - 8, 18, 1);
    g.fillStyle(PAL.stone, 1);
  }
  g.fillStyle(PAL.stoneLight, 0.3); g.fillRect(0, wallY, W, 2);
  return wallY;
}

function drawBattlefield(scene) {
  const g = scene.add.graphics().setDepth(-5);
  for (let y = 0; y < 300; y++) {
    const t = y / 300;
    const r = Phaser.Math.Linear(0x0a, 0x1a, t), gr = Phaser.Math.Linear(0x08, 0x1a, t), b = Phaser.Math.Linear(0x12, 0x2e, t);
    g.fillStyle((r << 16) | (gr << 8) | b, 1); g.fillRect(0, y, W, 1);
  }
  g.fillStyle(0x0f1a0a, 0.8);
  for (let x = 0; x < W; x += 3) { const h = 15 + Math.sin(x*0.03)*8 + Math.sin(x*0.07)*5 + Math.random()*4; g.fillRect(x, 300 - h, 3, h); }
  g.fillStyle(PAL.grassDark, 1); g.fillRect(0, 300, W, H - 300);
  for (let y = 300; y < H - 110; y += 12) { g.fillStyle(Math.random()<0.5 ? PAL.grass : PAL.grassDark, 0.3); g.fillRect(0, y, W, 6); }
  g.fillStyle(PAL.dirtDark, 0.4);
  for (let y = 0; y < H - 100; y += 2) { const t = y/(H-100), pw = 20+t*60, cx = W/2+Math.sin(y*0.01)*15; g.fillRect(cx-pw/2, y, pw, 2); }
}

function drawTorches(scene, wallY) {
  const torches = [];
  [60, W/2, W-60].forEach(tx => {
    const p = scene.add.graphics().setDepth(1); p.fillStyle(PAL.woodDark, 1); p.fillRect(tx-2, wallY-34, 4, 20);
    torches.push({ x: tx, y: wallY-36, gfx: scene.add.graphics().setDepth(2) });
  });
  return torches;
}

function updateTorches(torches, time) {
  torches.forEach(t => {
    t.gfx.clear();
    const f1 = Math.sin(time*0.008+t.x)*2, f2 = Math.cos(time*0.012+t.x*0.5)*1.5;
    t.gfx.fillStyle(PAL.fire, 0.15); t.gfx.fillCircle(t.x+f2, t.y-4, 18);
    t.gfx.fillStyle(PAL.fire, 0.8); t.gfx.fillEllipse(t.x+f1, t.y-3, 6, 10);
    t.gfx.fillStyle(PAL.torch, 0.9); t.gfx.fillEllipse(t.x+f1*0.5, t.y-2, 3, 6);
  });
}

function createFieldDebris(scene) {
  const items = [];
  for (let i = 0; i < 20; i++) {
    const x = Phaser.Math.Between(0, W), y = Phaser.Math.Between(0, H-120);
    const obj = scene.add.graphics().setDepth(-2);
    const type = Math.random();
    if (type < 0.5) { obj.fillStyle(PAL.grassLight, 0.3+Math.random()*0.2); const h = Phaser.Math.Between(3,7); obj.fillTriangle(x-2,y,x,y-h,x+2,y); }
    else if (type < 0.8) { obj.fillStyle(PAL.stoneDark, 0.25); obj.fillCircle(x,y,Phaser.Math.Between(2,4)); }
    else { obj.fillStyle(0xccbbaa, 0.15); obj.fillCircle(x,y,3); }
    items.push({ obj, speed: Phaser.Math.Between(8,25), y });
  }
  return items;
}

function updateFieldDebris(items, delta) {
  for (const it of items) { it.y += it.speed*delta/1000; it.obj.y += it.speed*delta/1000; if (it.y > H+10) { it.y = -10; it.obj.y -= H+20; } }
}

class ClassSelectScene extends Phaser.Scene {
  constructor() { super('ClassSelectScene'); }
  create() {
    this.add.rectangle(W/2,H/2,W,H,0x0e0c08);
    const b = this.add.graphics(); b.lineStyle(2,PAL.gold,0.3); b.strokeRect(15,15,W-30,H-30);
    this.add.text(W/2,45,'Choose Thy Class',{fontSize:'24px',fontFamily:'serif',color:PAL.accent,fontStyle:'italic'}).setOrigin(0.5);

    this.add.text(W/2,680,'Your starting class determines base stats. Spec into ANY class later for abilities.',{
      fontSize:'9px',fontFamily:'serif',color:'#4a4030',fontStyle:'italic',align:'center',wordWrap:{width:380}
    }).setOrigin(0.5);

    const keys = Object.keys(CLASSES), cardH = 130, startY = 90;
    const statKeys = ['fort','might','agil','haste','armor','per','luk'];
    const statNames = ['FOR','MIG','AGI','HAS','ARM','PER','LUK'];

    keys.forEach((key, i) => {
      const c = CLASSES[key], y = startY + i * (cardH + 14);
      const bg = this.add.graphics();
      bg.fillStyle(0x1a1610,0.9); bg.fillRoundedRect(30,y,W-60,cardH,6);
      bg.lineStyle(1,c.color,0.4); bg.strokeRoundedRect(30,y,W-60,cardH,6);

      this.drawClassIcon(70, y+40, key, c.color);
      this.add.text(115,y+12,c.name.toUpperCase(),{fontSize:'18px',fontFamily:'serif',color:c.accent});
      this.add.text(115,y+36,c.desc,{fontSize:'11px',fontFamily:'serif',color:PAL.textDim,wordWrap:{width:290},fontStyle:'italic'});
      this.add.text(115,y+58,`Special: ${CLASS_SPECS[key].special} — ${CLASS_SPECS[key].desc}`,{fontSize:'9px',fontFamily:'serif',color:'#665a44',fontStyle:'italic'});

      const barY = y + 80;
      statKeys.forEach((sk,si) => {
        const bx = 115+si*45;
        this.add.text(bx,barY,statNames[si],{fontSize:'8px',fontFamily:'serif',color:'#665a44'});
        this.add.graphics().fillStyle(0x2a2418,1).fillRect(bx,barY+12,36,5);
        this.add.graphics().fillStyle(c.color,0.8).fillRect(bx,barY+12,36*((c.base[sk]||0)/8),5);
      });

      const zone = this.add.zone(30,y,W-60,cardH).setOrigin(0,0).setInteractive({useHandCursor:true});
      zone.on('pointerover',()=>{ bg.clear(); bg.fillStyle(0x2a2418,0.95); bg.fillRoundedRect(30,y,W-60,cardH,6); bg.lineStyle(2,c.color,0.8); bg.strokeRoundedRect(30,y,W-60,cardH,6); });
      zone.on('pointerout',()=>{ bg.clear(); bg.fillStyle(0x1a1610,0.9); bg.fillRoundedRect(30,y,W-60,cardH,6); bg.lineStyle(1,c.color,0.4); bg.strokeRoundedRect(30,y,W-60,cardH,6); });
      zone.on('pointerdown',()=>{ createPlayer(key); this.scene.start('GameScene'); });
    });
  }

  drawClassIcon(x, y, key, color) {
    const g = this.add.graphics();
    if (key === 'ranger') { g.lineStyle(2,color,1); g.beginPath(); g.arc(x,y,16,-1.2,1.2,false); g.strokePath(); g.lineStyle(1,0xccbbaa,0.8); g.moveTo(x+14,y-14); g.lineTo(x+14,y+14); g.strokePath(); g.fillStyle(0xccbbaa,0.8); g.fillTriangle(x+20,y,x+14,y-3,x+14,y+3); }
    else if (key === 'knight') { g.fillStyle(color,0.8); g.fillRoundedRect(x-11,y-14,22,28,4); g.lineStyle(2,0xdddddd,0.4); g.strokeRoundedRect(x-11,y-14,22,28,4); g.fillStyle(0xdddddd,0.3); g.fillCircle(x,y,5); }
    else if (key === 'mage') { g.lineStyle(2,PAL.woodDark,1); g.moveTo(x,y-18); g.lineTo(x,y+18); g.strokePath(); g.fillStyle(color,1); g.fillCircle(x,y-18,6); g.fillStyle(0xffffff,0.3); g.fillCircle(x-2,y-20,2); }
    else if (key === 'cleric') { g.fillStyle(color,0.9); g.fillRect(x-3,y-16,6,32); g.fillRect(x-11,y-8,22,6); g.fillStyle(0xffffff,0.2); g.fillCircle(x,y-4,4); }
  }
}

// ════════════════════════════════════════════════════════════
//  GAME SCENE
// ════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  create() {
    this.input.mouse.disableContextMenu();
    drawBattlefield(this);
    this.wallY = drawCastleWall(this);
    this.torches = drawTorches(this, this.wallY);
    this.debris = createFieldDebris(this);

    this.wave = 0; this.waveActive = false; this.enemiesRemaining = 0;
    this.hp = getMaxHP(); this.maxHp = getMaxHP();
    this.kills = 0; this.combo = 0; this.comboTimer = 0;
    this.lastFire = 0; this.invincible = 0; this.shakeTime = 0;
    this.particles = [];
    this.specialCooldown = 0;
    this.shieldWallActive = 0; // remaining shield wall duration
    this.novaEffects = [];
    this.hitStop = 0; // ms of slow-mo on crit-kill (game feel)
    this.acidPools = []; // persistent ground hazards from missed Spitter shots

    this.bullets = this.add.group();
    this.enemyBullets = this.add.group();
    this.enemies = this.add.group();

    this.playerGfx = this.add.graphics().setDepth(20);
    this.shieldGfx = this.add.graphics().setDepth(21);
    this.shipX = W / 2;
    this.shipY = this.wallY - 8;
    this.aimAngle = -Math.PI / 2; // default: up
    this.drawPlayer();

    this.createHUD();

    this.cursors = this.input.keyboard.createCursorKeys();
    this.wasd = this.input.keyboard.addKeys('W,A,S,D');
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.tabKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.TAB);

    // Tab to cycle specials
    this.tabKey.on('down', () => this.cycleSpecial());

    // Right click for special
    this.input.on('pointerdown', (pointer) => {
      if (pointer.rightButtonDown()) this.useSpecial();
    });

    this.time.delayedCall(1200, () => this.startWave());
  }

  cycleSpecial() {
    const unlocked = getUnlockedSpecs();
    if (unlocked.length <= 1) return;
    const idx = unlocked.indexOf(PLAYER.activeSpecial);
    PLAYER.activeSpecial = unlocked[(idx + 1) % unlocked.length];
    this.showSpecialSwap();
    this.updateHUD();
  }

  showSpecialSwap() {
    if (!PLAYER.activeSpecial) return;
    const spec = CLASS_SPECS[PLAYER.activeSpecial];
    const txt = this.add.text(W/2, H/2 + 40, `Special: ${spec.special}`, {
      fontSize: '16px', fontFamily: 'serif', color: spec.accent, fontStyle: 'italic'
    }).setOrigin(0.5).setDepth(100);
    this.tweens.add({ targets: txt, alpha: 0, y: H/2, duration: 1000, onComplete: () => txt.destroy() });
  }

  useSpecial() {
    if (!PLAYER.activeSpecial) return;
    if (this.specialCooldown > 0) return;
    const specKey = PLAYER.activeSpecial;
    const data = getSpecData(specKey);
    if (!data) return;

    if (specKey === 'ranger') {
      // Volley: fire multiple arrows in a cone toward cursor
      const baseAngle = this.aimAngle;
      const spread = data.spread;
      for (let i = 0; i < data.arrows; i++) {
        const t = data.arrows === 1 ? 0 : (i / (data.arrows - 1)) - 0.5;
        const angle = baseAngle + t * spread * 2;
        this.spawnBullet(angle, data.dmgMult);
      }
      this.specialCooldown = data.cd;
    }
    else if (specKey === 'knight') {
      // Shield Wall: invulnerability
      this.shieldWallActive = data.dur;
      this.specialCooldown = data.cd;
    }
    else if (specKey === 'mage') {
      // Arcane Nova: AoE damage around player
      const radius = data.radius;
      this.enemies.getChildren().forEach(eg => {
        const e = eg.getData('enemy');
        if (!e || !e.alive) return;
        if (Phaser.Math.Distance.Between(this.shipX, this.shipY, e.x, e.y) < radius) {
          e.hp -= data.dmg;
          this.spawnParticle(e.x, e.y, 0x9966ff, 4);
          if (e.hp <= 0) { e.alive = false; this.spawnParticle(e.x,e.y,e.color,12); this.spawnParticle(e.x,e.y,0x44aa22,6); e.gfx.clear(); this.kills++; this.enemiesRemaining--; this.gainXP(e.xpValue); }
        }
      });
      // Visual: expanding ring
      const ring = this.add.graphics().setDepth(30);
      this.novaEffects.push({ gfx: ring, x: this.shipX, y: this.shipY, radius: 10, maxRadius: radius, life: 0.4 });
      this.specialCooldown = data.cd;
    }
    else if (specKey === 'cleric') {
      // Divine Mend: heal
      const heal = this.maxHp * data.healPct;
      this.hp = Math.min(this.hp + heal, this.maxHp);
      this.spawnParticle(this.shipX, this.shipY, 0xffe066, 12);
      this.specialCooldown = data.cd;
    }
    this.updateHUD();
  }

  createHUD() {
    const hpFrame = this.add.graphics().setDepth(50);
    hpFrame.fillStyle(PAL.stoneDark,0.9); hpFrame.fillRoundedRect(12,H-32,206,22,3);
    hpFrame.lineStyle(1,PAL.stoneLight,0.4); hpFrame.strokeRoundedRect(12,H-32,206,22,3);
    this.hpBar = this.add.graphics().setDepth(51);
    this.hpText = this.add.text(115,H-29,'',{fontSize:'11px',fontFamily:'serif',color:'#fff'}).setOrigin(0.5,0).setDepth(52);

    this.waveText = this.add.text(W/2,8,'',{fontSize:'14px',fontFamily:'serif',color:PAL.accent,fontStyle:'italic'}).setOrigin(0.5,0).setDepth(50);
    this.levelText = this.add.text(W-15,H-32,'',{fontSize:'11px',fontFamily:'serif',color:PAL.accent}).setOrigin(1,0).setDepth(50);

    const xpFrame = this.add.graphics().setDepth(50); xpFrame.fillStyle(PAL.stoneDark,0.7); xpFrame.fillRect(W-165,H-14,152,7);
    this.xpBar = this.add.graphics().setDepth(51);

    this.killText = this.add.text(15,8,'',{fontSize:'11px',fontFamily:'serif',color:PAL.textDim}).setDepth(50);
    this.statPtsText = this.add.text(15,24,'',{fontSize:'11px',fontFamily:'serif',color:'#d4a017',fontStyle:'italic'}).setDepth(50);
    this.comboText = this.add.text(W/2,50,'',{fontSize:'16px',fontFamily:'serif',color:PAL.accent,fontStyle:'italic'}).setOrigin(0.5).setDepth(50).setAlpha(0);

    // Special ability indicator
    this.specialText = this.add.text(W/2,H-50,'',{fontSize:'10px',fontFamily:'serif',color:'#aaa',fontStyle:'italic'}).setOrigin(0.5).setDepth(50);
    this.specialCdBar = this.add.graphics().setDepth(50);

    this.updateHUD();
  }

  updateHUD() {
    this.hpBar.clear();
    const pct = this.hp / this.maxHp;
    this.hpBar.fillStyle(pct > 0.5 ? 0x6b8e23 : pct > 0.25 ? 0xcc8800 : 0x8b1a1a, 1);
    this.hpBar.fillRoundedRect(15,H-29,200*pct,16,2);
    this.hpText.setText(`${Math.ceil(this.hp)} / ${this.maxHp}`);
    const band = this.wave > 0 ? getWaveBand(this.wave) : null;
    this.waveText.setText(band ? `— Wave ${this.wave} · ${band.name} —` : `— Wave ${this.wave} —`);

    const xpN = xpForLevel(PLAYER.level);
    this.levelText.setText(`Lv ${PLAYER.level}  ◆  ${PLAYER.xp}/${xpN} XP`);
    this.xpBar.clear(); this.xpBar.fillStyle(PAL.gold,0.8); this.xpBar.fillRect(W-164,H-13,150*(PLAYER.xp/xpN),5);
    this.killText.setText(`Kills: ${this.kills}`);

    if (PLAYER.statPoints > 0) this.statPtsText.setText(`◆ ${PLAYER.statPoints} point${PLAYER.statPoints>1?'s':''} pending`);
    else this.statPtsText.setText('');

    // Special indicator
    if (PLAYER.activeSpecial) {
      const spec = CLASS_SPECS[PLAYER.activeSpecial];
      const lv = getSpecLevel(PLAYER.activeSpecial);
      const unlocked = getUnlockedSpecs();
      const tabHint = unlocked.length > 1 ? '  [Tab: swap]' : '';
      this.specialText.setText(`${spec.special} Lv${lv}${tabHint}`);
      this.specialText.setColor(spec.accent);
    } else {
      this.specialText.setText('No special unlocked');
    }
  }

  drawPlayer() {
    const g = this.playerGfx;
    g.clear();
    const x = this.shipX, y = this.shipY, key = PLAYER.classKey;
    if (this.invincible > 0 && this.shieldWallActive <= 0 && Math.floor(Date.now()/80)%2) return;

    g.fillStyle(PLAYER.color, 1); g.fillRoundedRect(x-8,y-8,16,18,2);
    g.fillStyle(0xd4a574, 1); g.fillCircle(x,y-14,6);

    if (key==='knight') { g.fillStyle(0x888888,1); g.fillRoundedRect(x-7,y-20,14,10,3); g.fillRect(x-2,y-15,4,6); }
    else if (key==='ranger') { g.fillStyle(0x4a7a2e,0.9); g.fillTriangle(x-8,y-14,x,y-24,x+8,y-14); }
    else if (key==='mage') { g.fillStyle(0x5533aa,0.9); g.fillTriangle(x-6,y-14,x,y-28,x+6,y-14); g.fillStyle(0xffffff,0.3); g.fillCircle(x,y-16,2); }
    else if (key==='cleric') { g.fillStyle(PAL.gold,0.8); g.fillCircle(x,y-20,4); g.fillStyle(PAL.gold,0.3); g.fillCircle(x,y-20,7); }

    // Aim line (subtle)
    g.lineStyle(1, PLAYER.color, 0.3);
    g.moveTo(x, y - 20);
    g.lineTo(x + Math.cos(this.aimAngle) * 25, y - 20 + Math.sin(this.aimAngle) * 25);
    g.strokePath();

    g.fillStyle(0x3a2a1a,1); g.fillRect(x-5,y+10,4,6); g.fillRect(x+1,y+10,4,6);
  }

  spawnBullet(angle, dmgMult = 1) {
    const b = this.add.graphics();
    const key = PLAYER.classKey;
    const speed = 520;
    const bx = this.shipX + Math.cos(angle) * 20;
    const by = this.shipY - 20 + Math.sin(angle) * 20;

    // Combo pierce: lock at fire-time, decremented per hit
    const pierce = comboPierceFor(this.combo);

    // Pierce halo behind the bullet
    if (pierce > 0) {
      const halo = pierce >= 3 ? 0xffe066 : pierce >= 2 ? 0xff9933 : 0xccddff;
      b.fillStyle(halo, 0.18 + pierce * 0.08); b.fillCircle(0, 0, 6 + pierce * 2);
      b.fillStyle(halo, 0.35); b.fillCircle(0, 0, 3 + pierce);
    }

    // Rotate the projectile visual to match angle
    if (key === 'ranger') {
      b.fillStyle(0xccbbaa,1); b.fillRect(-1,-7,2,14); b.fillStyle(0x888888,1); b.fillTriangle(-3,-7,0,-12,3,-7);
    } else if (key === 'knight') {
      b.fillStyle(0x888888,1); b.fillRect(-1.5,-5,3,10); b.fillStyle(0xaaaaaa,1); b.fillTriangle(-3,-5,0,-10,3,-5);
    } else if (key === 'mage') {
      b.fillStyle(0x9966ff,0.9); b.fillCircle(0,0,4); b.fillStyle(0xcc99ff,0.5); b.fillCircle(0,0,7);
    } else if (key === 'cleric') {
      b.fillStyle(PAL.gold,0.9); b.fillRect(-1,-5,2,10); b.fillRect(-3,-1,6,2);
    }

    b.setPosition(bx, by).setDepth(15);
    b.setRotation(angle + Math.PI / 2);
    b.setData('vx', Math.cos(angle) * speed);
    b.setData('vy', Math.sin(angle) * speed);
    b.setData('dmgMult', dmgMult);
    b.setData('pierce', pierce);
    b.setData('hits', []);
    this.bullets.add(b);
  }

  fireProjectile() {
    const now = this.time.now;
    if (now - this.lastFire < getFireDelay()) return;
    this.lastFire = now;
    this.spawnBullet(this.aimAngle, 1);
  }

  fireEnemyBullet(x, y) {
    const b = this.add.graphics();
    b.fillStyle(0x44ff44,0.8); b.fillCircle(0,0,4); b.fillStyle(0x88ff88,0.4); b.fillCircle(0,0,6);
    b.setPosition(x,y+18).setDepth(15);
    const angle = Phaser.Math.Angle.Between(x,y,this.shipX,this.shipY);
    const speed = 140 + this.wave * 10;
    b.setData('vx', Math.cos(angle)*speed); b.setData('vy', Math.sin(angle)*speed);
    this.enemyBullets.add(b);
  }

  spawnParticle(x,y,color,count=6) {
    for (let i = 0; i < count; i++) {
      const p = this.add.circle(x,y,Phaser.Math.Between(1,3),color,1).setDepth(25);
      const a = Math.random()*Math.PI*2, s = Phaser.Math.Between(40,160);
      this.particles.push({obj:p,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.4+Math.random()*0.3});
    }
  }

  spawnAcidPool(x, y) {
    // Pre-generate bubble offsets so the visual is stable, not flickering each frame
    const bubbles = [];
    for (let i = 0; i < 4; i++) bubbles.push({ ox: (Math.random()-0.5)*32, oy: (Math.random()-0.3)*8, r: 1+Math.random()*1.5, ph: Math.random()*Math.PI*2 });
    const gfx = this.add.graphics().setDepth(8); // below player (depth 20), above ground
    this.acidPools.push({ x, y, life: 4.0, maxLife: 4.0, gfx, radius: 26, tickTimer: 0, bubbles });
    // Splash on creation
    this.spawnParticle(x, y, 0x44ff44, 5);
  }

  takeDamage(amount) {
    if (this.invincible > 0) return;
    if (this.shieldWallActive > 0) { this.spawnParticle(this.shipX,this.shipY,0x8ca8cc,4); return; }
    this.hp -= amount * (1 - getArmor());
    this.invincible = 0.8; this.shakeTime = 0.15;
    this.spawnParticle(this.shipX,this.shipY,0xcc3333,8);

    if (this.hp <= 0) {
      this.hp = 0; this.updateHUD();
      PLAYER.totalKills += this.kills;
      PLAYER.runs = (PLAYER.runs||0)+1;
      SaveManager.save();
      const dd = { wave: this.wave, kills: this.kills };
      if (PLAYER.statPoints > 0) this.scene.start('LevelUpScene', dd);
      else this.scene.start('GameOverScene', dd);
    }
  }

  gainXP(amount, comboGain = 1) {
    this.combo += comboGain; this.comboTimer = 2;
    PLAYER.xp += Math.floor(amount * (1 + this.combo * 0.05));
    if (this.combo >= 3) {
      const p = comboPierceFor(this.combo);
      const tier = p >= 3 ? '  ◆ Pierce III' : p >= 2 ? '  ◆ Pierce II' : p >= 1 ? '  ◆ Pierce I' : '';
      const color = p >= 3 ? '#ffe066' : p >= 2 ? '#ff9933' : p >= 1 ? '#ccddff' : PAL.accent;
      this.comboText.setText(`${this.combo}x Combo${tier}`);
      this.comboText.setColor(color);
      this.comboText.setAlpha(1);
    }
    while (PLAYER.xp >= xpForLevel(PLAYER.level)) {
      PLAYER.xp -= xpForLevel(PLAYER.level);
      PLAYER.level++; PLAYER.statPoints++;
      const txt = this.add.text(W/2,H/2,`Level ${PLAYER.level}!`,{fontSize:'28px',fontFamily:'serif',color:PAL.accent,stroke:'#1a1408',strokeThickness:3,fontStyle:'italic'}).setOrigin(0.5).setDepth(100);
      const sub = this.add.text(W/2,H/2+30,'+1 Point',{fontSize:'14px',fontFamily:'serif',color:PAL.text,fontStyle:'italic'}).setOrigin(0.5).setDepth(100);
      this.tweens.add({targets:[txt,sub],y:'-=60',alpha:0,duration:1200,ease:'Power2',onComplete:()=>{txt.destroy();sub.destroy();}});
    }
    this.updateHUD();
  }

  startWave() {
    this.wave++;
    PLAYER.wavesCleared = this.wave - 1;
    if (this.wave > PLAYER.highestWave) PLAYER.highestWave = this.wave;
    this.waveActive = true;

    const band = getWaveBand(this.wave);
    const isBandStart = WAVE_BANDS.some(b => b.from === this.wave);

    // Band entry: extra title above the wave count, lingers a beat longer
    if (isBandStart) {
      const bandTxt = this.add.text(W/2,H/2-130,`~ ${band.name} ~`,{fontSize:'20px',fontFamily:'serif',color:'#a89070',fontStyle:'italic'}).setOrigin(0.5).setDepth(101);
      this.tweens.add({targets:bandTxt,alpha:0,duration:900,delay:1700,onComplete:()=>bandTxt.destroy()});
    }

    const announce = this.add.text(W/2,H/2-80,`Wave ${this.wave}`,{fontSize:'32px',fontFamily:'serif',color:PAL.accent,stroke:'#1a1408',strokeThickness:3,fontStyle:'italic'}).setOrigin(0.5).setDepth(100);
    const flavor = WAVE_FLAVORS[Math.min(this.wave-1, WAVE_FLAVORS.length-1)];
    const sub = this.add.text(W/2,H/2-42,flavor,{fontSize:'12px',fontFamily:'serif',color:PAL.textDim,fontStyle:'italic',wordWrap:{width:380},align:'center'}).setOrigin(0.5).setDepth(100);
    this.tweens.add({targets:[announce,sub],alpha:0,duration:600,delay:1200,onComplete:()=>{announce.destroy();sub.destroy();}});
    this.time.delayedCall(800,()=>this.spawnWaveEnemies());
    this.updateHUD();
  }

  spawnWaveEnemies() {
    const count = 6+this.wave*2, rows = Math.ceil(count/8), cols = Math.min(count,8);
    let spawned = 0;
    for (let r = 0; r < rows && spawned < count; r++) {
      const rc = Math.min(cols, count-spawned);
      for (let c = 0; c < rc; c++) {
        const ex = 50+c*((W-100)/(rc-1||1)), ey = -30-r*50, ty = 40+r*50;
        let type = 'crawler';
        if (this.wave>=3&&Math.random()<0.25) type='flyer';
        if (this.wave>=4&&Math.random()<0.18) type='charger';
        if (this.wave>=5&&Math.random()<0.15) type='spitter';
        this.spawnEnemy(ex,ey,ty,type,spawned*70); spawned++;
      }
    }
    this.enemiesRemaining = spawned;
  }

  spawnEnemy(x,startY,targetY,type,delay) {
    const colors={crawler:0x5a8a2a,flyer:0x9a7a22,spitter:0x8a3322,charger:0x6a1a0a};
    const hpMap={crawler:2+this.wave,flyer:1+this.wave,spitter:3+this.wave,charger:4+Math.floor(this.wave*1.5)};
    const xpMap={crawler:8,flyer:12,spitter:15,charger:14};
    const g = this.add.graphics().setDepth(10);
    const enemy = {gfx:g,x,y:startY,targetY,type,hp:hpMap[type],maxHp:hpMap[type],xpValue:xpMap[type],color:colors[type],arrived:false,diveTimer: type==='charger' ? Phaser.Math.Between(2000,3500) : 0,diving:false,diveSpeed:0,shootTimer:Phaser.Math.Between(1500,3500),wobble:0,wobbleDir:Math.random()<0.5?1:-1,legPhase:Math.random()*Math.PI*2,alive:true,chargeAngle:0,chargeLocked:false};
    this.time.delayedCall(delay,()=>{this.tweens.add({targets:enemy,y:targetY,duration:900,ease:'Back.easeOut',onComplete:()=>{enemy.arrived=true;}});});
    this.enemies.add(g); g.setData('enemy',enemy);
  }

  drawEnemy(e, time) {
    e.gfx.clear();
    if (!e.alive) return;
    const x=e.x,y=e.y,lo=Math.sin((time*0.006)+e.legPhase)*3;
    if (e.type==='crawler') {
      e.gfx.fillStyle(e.color,1); e.gfx.fillEllipse(x,y,18,12); e.gfx.fillEllipse(x,y+10,14,8);
      e.gfx.fillStyle(0x3a5a1a,1); e.gfx.fillCircle(x,y+16,6);
      e.gfx.lineStyle(2,0x2a4a10,1); e.gfx.moveTo(x-5,y+20); e.gfx.lineTo(x-8,y+26); e.gfx.moveTo(x+5,y+20); e.gfx.lineTo(x+8,y+26); e.gfx.strokePath();
      e.gfx.lineStyle(1,e.color,0.7);
      for (let s=-1;s<=1;s+=2) { e.gfx.moveTo(x+s*8,y-2); e.gfx.lineTo(x+s*16,y-4+lo); e.gfx.moveTo(x+s*8,y+4); e.gfx.lineTo(x+s*16,y+6-lo); e.gfx.moveTo(x+s*6,y+10); e.gfx.lineTo(x+s*14,y+12+lo); }
      e.gfx.strokePath();
      e.gfx.fillStyle(0xff4444,0.8); e.gfx.fillCircle(x-3,y+14,2); e.gfx.fillCircle(x+3,y+14,2);
    } else if (e.type==='flyer') {
      const wf=Math.sin(time*0.015+e.legPhase)*6;
      e.gfx.fillStyle(e.color,0.4); e.gfx.fillEllipse(x-14-wf,y-2,16,8); e.gfx.fillEllipse(x+14+wf,y-2,16,8);
      e.gfx.fillStyle(e.color,1); e.gfx.fillEllipse(x,y,12,16);
      e.gfx.fillStyle(0x6a5a12,1); e.gfx.fillTriangle(x-4,y-8,x+4,y-8,x,y-18);
      e.gfx.fillStyle(0xff6600,0.9); e.gfx.fillCircle(x-3,y+4,2); e.gfx.fillCircle(x+3,y+4,2);
    } else if (e.type==='spitter') {
      e.gfx.fillStyle(e.color,1); e.gfx.fillRoundedRect(x-14,y-8,28,22,6);
      e.gfx.fillStyle(0x5a2212,0.6); e.gfx.fillRoundedRect(x-12,y-6,24,8,3);
      e.gfx.lineStyle(2,e.color,0.8);
      for (let s=-1;s<=1;s+=2) { e.gfx.moveTo(x+s*12,y); e.gfx.lineTo(x+s*20,y+4+lo); e.gfx.moveTo(x+s*12,y+8); e.gfx.lineTo(x+s*20,y+14-lo); }
      e.gfx.strokePath();
      e.gfx.fillStyle(0x44ff44,0.6); e.gfx.fillCircle(x,y+16,4); e.gfx.fillStyle(0x44ff44,0.3); e.gfx.fillCircle(x,y+22,2);
      e.gfx.fillStyle(0xff2222,0.9); e.gfx.fillCircle(x-5,y-2,2.5); e.gfx.fillCircle(x+5,y-2,2.5);
    } else if (e.type==='charger') {
      // Beetle-like body, dark red, with a forward horn that points along chargeAngle
      e.gfx.fillStyle(e.color,1); e.gfx.fillRoundedRect(x-14,y-9,28,20,5);
      e.gfx.fillStyle(0x4a0a02,0.6); e.gfx.fillRoundedRect(x-12,y-7,24,6,3);
      // Carapace ridge
      e.gfx.fillStyle(0x8a2818,0.9); e.gfx.fillRect(x-2,y-9,4,20);
      // Eyes (orange-yellow, predator)
      e.gfx.fillStyle(0xffaa22,0.95); e.gfx.fillCircle(x-5,y-2,2.5); e.gfx.fillCircle(x+5,y-2,2.5);
      // Legs (heavy)
      e.gfx.lineStyle(2,0x4a0a02,0.9);
      for (let s=-1;s<=1;s+=2) { e.gfx.moveTo(x+s*12,y-3); e.gfx.lineTo(x+s*18,y+lo); e.gfx.moveTo(x+s*12,y+5); e.gfx.lineTo(x+s*18,y+10-lo); }
      e.gfx.strokePath();
      // Horn — orientation matches charge angle; idle horn points at player anyway during lock
      const hornDir = (e.chargeLocked || e.diving) ? e.chargeAngle : Math.PI/2;
      const hx = Math.cos(hornDir)*16, hy = Math.sin(hornDir)*16;
      e.gfx.fillStyle(0xccaa88,1);
      e.gfx.fillTriangle(x+hx*0.5+Math.cos(hornDir-1.5)*3, y+hy*0.5+Math.sin(hornDir-1.5)*3,
                          x+hx*0.5+Math.cos(hornDir+1.5)*3, y+hy*0.5+Math.sin(hornDir+1.5)*3,
                          x+hx, y+hy);
      // Telegraph during windup: red ring + aim line
      if (e.chargeLocked && !e.diving) {
        const t = 1 - Math.max(0, e.diveTimer / 800);
        e.gfx.lineStyle(2, 0xff3322, 0.35 + t*0.5);
        e.gfx.strokeCircle(x, y, 18 + t*10);
        e.gfx.lineStyle(1, 0xff3322, 0.5 + t*0.4);
        e.gfx.moveTo(x,y); e.gfx.lineTo(x+Math.cos(e.chargeAngle)*60, y+Math.sin(e.chargeAngle)*60);
        e.gfx.strokePath();
      }
    }
    if (e.hp<e.maxHp) { e.gfx.fillStyle(0x1a1a1a,0.8); e.gfx.fillRect(x-12,y-22,24,3); e.gfx.fillStyle(0xcc2222,1); e.gfx.fillRect(x-12,y-22,24*(e.hp/e.maxHp),3); }
  }

  update(time, delta) {
    // Hit-stop: scale world-time during the slow-mo window. Input/aim still tick
    // at real time (handled below) so the player doesn't feel input lag.
    let dt = delta/1000;
    if (this.hitStop > 0) { this.hitStop -= delta; dt *= 0.08; }
    updateTorches(this.torches, time);
    updateFieldDebris(this.debris, delta);

    if (this.shakeTime>0) { this.shakeTime-=dt; this.cameras.main.setScroll(Phaser.Math.Between(-3,3),Phaser.Math.Between(-3,3)); }
    else this.cameras.main.setScroll(0,0);

    if (this.invincible>0) this.invincible-=dt;
    if (this.comboTimer>0) { this.comboTimer-=dt; if(this.comboTimer<=0){this.combo=0;this.comboText.setAlpha(0);} }
    if (this.specialCooldown>0) this.specialCooldown -= delta;
    if (this.shieldWallActive>0) this.shieldWallActive -= delta;

    // Shield wall visual
    this.shieldGfx.clear();
    if (this.shieldWallActive > 0) {
      const sa = Math.min(1, this.shieldWallActive / 500) * 0.4;
      this.shieldGfx.lineStyle(3, 0x8ca8cc, sa);
      this.shieldGfx.strokeCircle(this.shipX, this.shipY - 5, 22 + Math.sin(time*0.01)*3);
      this.shieldGfx.fillStyle(0x8ca8cc, sa * 0.3);
      this.shieldGfx.fillCircle(this.shipX, this.shipY - 5, 20);
    }

    // Update aim angle toward mouse
    const ptr = this.input.activePointer;
    this.aimAngle = Phaser.Math.Angle.Between(this.shipX, this.shipY - 20, ptr.worldX, ptr.worldY);

    // Movement
    let dx = 0;
    if (this.cursors.left.isDown || this.wasd.A.isDown) dx = -1;
    if (this.cursors.right.isDown || this.wasd.D.isDown) dx = 1;
    this.shipX += dx * getMoveSpeed() * dt;
    this.shipX = Phaser.Math.Clamp(this.shipX, 24, W-24);
    this.drawPlayer();

    // Fire: left mouse held OR space
    if (ptr.leftButtonDown() || this.spaceKey.isDown) this.fireProjectile();

    // Special cooldown bar
    this.specialCdBar.clear();
    if (PLAYER.activeSpecial) {
      const data = getSpecData(PLAYER.activeSpecial);
      if (data) {
        const cdPct = Math.max(0, this.specialCooldown / data.cd);
        const barW = 60, barH = 4, barX = W/2 - barW/2, barY = H - 44;
        this.specialCdBar.fillStyle(0x1a1a1a, 0.6); this.specialCdBar.fillRect(barX, barY, barW, barH);
        if (cdPct > 0) { this.specialCdBar.fillStyle(0x663333, 0.8); this.specialCdBar.fillRect(barX, barY, barW * cdPct, barH); }
        else { this.specialCdBar.fillStyle(0x44aa44, 0.8); this.specialCdBar.fillRect(barX, barY, barW, barH); }
      }
    }

    // Player bullets — pierce-aware, crit-aware
    this.bullets.getChildren().forEach(b => {
      if (!b.active) return;
      b.x += b.getData('vx')*dt; b.y += b.getData('vy')*dt;
      if (b.y<-20||b.y>H+20||b.x<-20||b.x>W+20) { b.destroy(); return; }
      this.enemies.getChildren().forEach(eg => {
        if (!b.active) return;
        const e = eg.getData('enemy');
        if (!e||!e.alive) return;
        if (Phaser.Math.Distance.Between(b.x,b.y,e.x,e.y)<18) {
          const hits = b.getData('hits');
          if (hits.includes(e)) return;
          hits.push(e);
          // Crit roll per hit (per-bullet would feel binary; per-hit lets pierce shots flicker)
          const isCrit = Math.random() < getCritChance();
          const dmg = getDamage() * (b.getData('dmgMult') || 1) * (isCrit ? getCritDmg() : 1);
          e.hp -= dmg;
          if (isCrit) { this.spawnParticle(e.x,e.y,0xffe066,8); this.spawnParticle(e.x,e.y-4,0xffffff,3); }
          else this.spawnParticle(e.x,e.y,e.color,3);
          if (e.hp<=0) {
            e.alive=false; this.spawnParticle(e.x,e.y,e.color,12); this.spawnParticle(e.x,e.y,0x44aa22,6);
            e.gfx.clear(); this.kills++; this.enemiesRemaining--;
            // Crit kills: jump combo by 2 + brief slow-mo flash for impact
            if (isCrit) {
              this.cameras.main.flash(60, 255, 230, 110, false);
              this.hitStop = Math.max(this.hitStop, 70);
            }
            this.gainXP(e.xpValue, isCrit ? 2 : 1);
          }
          const remaining = b.getData('pierce') || 0;
          if (remaining <= 0) { b.destroy(); return; }
          b.setData('pierce', remaining - 1);
        }
      });
    });

    // Enemy bullets — missed shots puddle into acid pools at the wall surface
    this.enemyBullets.getChildren().forEach(b => {
      b.x+=b.getData('vx')*dt; b.y+=b.getData('vy')*dt;
      if (b.x<-20||b.x>W+20||b.y<-30) { b.destroy(); return; }
      if (Phaser.Math.Distance.Between(b.x,b.y,this.shipX,this.shipY)<16) {
        b.destroy(); this.takeDamage(2+Math.floor(this.wave*0.5)); return;
      }
      // Crossed the wall plane → splash into a persistent pool
      if (b.y >= this.wallY - 4) {
        this.spawnAcidPool(Phaser.Math.Clamp(b.x, 20, W-20), this.wallY - 4);
        b.destroy();
      }
    });

    // Enemies
    this.enemies.getChildren().forEach(eg => {
      const e = eg.getData('enemy');
      if (!e||!e.alive) return;
      // Idle wobble (chargers freeze during telegraph for clearer aim-lock readability)
      const wobbling = e.arrived && !e.diving && !(e.type==='charger' && e.chargeLocked);
      if (wobbling) { e.wobble+=dt*1.2*e.wobbleDir; e.x+=Math.sin(e.wobble)*30*dt; e.x=Phaser.Math.Clamp(e.x,20,W-20); }
      if (e.type==='flyer'&&e.arrived&&!e.diving) { e.diveTimer-=delta; if(e.diveTimer<=0){e.diving=true;e.diveSpeed=200+this.wave*15;} }
      if (e.type==='charger'&&e.arrived&&!e.diving) {
        e.diveTimer-=delta;
        // Lock aim at start of windup window so player has 800ms to dodge
        if (e.diveTimer<=800 && !e.chargeLocked) {
          e.chargeLocked = true;
          e.chargeAngle = Phaser.Math.Angle.Between(e.x, e.y, this.shipX, this.shipY);
        }
        if (e.diveTimer<=0) { e.diving=true; e.diveSpeed=380+this.wave*15; e.chargeLocked=false; }
      }
      if (e.diving) {
        if (e.type==='charger') {
          e.x += Math.cos(e.chargeAngle) * e.diveSpeed * dt;
          e.y += Math.sin(e.chargeAngle) * e.diveSpeed * dt;
          if (e.y>H+30||e.y<-50||e.x<-40||e.x>W+40) {
            e.y=-30; e.x=Phaser.Math.Between(50,W-50); e.diving=false;
            e.diveTimer=Phaser.Math.Between(2500,4500); e.arrived=false;
            e.targetY=Phaser.Math.Between(50,160);
            this.tweens.add({targets:e,y:e.targetY,duration:600,ease:'Sine.easeOut',onComplete:()=>{e.arrived=true;}});
          }
        } else {
          e.y+=e.diveSpeed*dt; e.x+=(e.x<this.shipX?1:-1)*60*dt;
          if (e.y>H+30) { e.y=-30; e.x=Phaser.Math.Between(40,W-40); e.diving=false; e.diveTimer=Phaser.Math.Between(2000,4000); e.arrived=false; e.targetY=Phaser.Math.Between(40,180); this.tweens.add({targets:e,y:e.targetY,duration:600,ease:'Sine.easeOut',onComplete:()=>{e.arrived=true;}}); }
        }
      }
      if (e.type==='spitter'&&e.arrived) { e.shootTimer-=delta; if(e.shootTimer<=0){this.fireEnemyBullet(e.x,e.y);e.shootTimer=Phaser.Math.Between(1200,3000-this.wave*50);} }
      if (e.arrived||e.diving) {
        if (Phaser.Math.Distance.Between(e.x,e.y,this.shipX,this.shipY)<22) {
          // Charger ram is the threat — 2x contact damage
          const dmg = e.type==='charger' ? (3+this.wave)*2 : 3+this.wave;
          this.takeDamage(dmg); e.hp=-999; e.alive=false;
          this.spawnParticle(e.x,e.y,e.color,10); e.gfx.clear(); this.enemiesRemaining--;
        }
      }
      this.drawEnemy(e, time);
    });

    // Nova effects
    for (let i = this.novaEffects.length-1; i >= 0; i--) {
      const n = this.novaEffects[i];
      n.life -= dt;
      n.radius += (n.maxRadius - n.radius) * dt * 6;
      n.gfx.clear();
      if (n.life > 0) {
        n.gfx.lineStyle(2, 0x9966ff, n.life * 2);
        n.gfx.strokeCircle(n.x, n.y, n.radius);
      } else { n.gfx.destroy(); this.novaEffects.splice(i, 1); }
    }

    // Acid pools — persistent ground hazard, ticks every 0.5s while player overlaps
    for (let i = this.acidPools.length-1; i >= 0; i--) {
      const p = this.acidPools[i];
      p.life -= dt; p.tickTimer -= dt;
      if (Phaser.Math.Distance.Between(p.x, p.y, this.shipX, this.shipY) < p.radius && p.tickTimer <= 0) {
        this.takeDamage(2);
        p.tickTimer = 0.5;
      }
      p.gfx.clear();
      if (p.life <= 0) { p.gfx.destroy(); this.acidPools.splice(i, 1); continue; }
      const fade = Math.min(1, p.life / 1.2); // fade-out in last 1.2s
      p.gfx.fillStyle(0x2a6a18, 0.55 * fade); p.gfx.fillEllipse(p.x, p.y, p.radius*2, p.radius*0.7);
      p.gfx.fillStyle(0x44cc44, 0.55 * fade); p.gfx.fillEllipse(p.x, p.y, p.radius*1.45, p.radius*0.5);
      p.gfx.fillStyle(0x88ff88, 0.45 * fade); p.gfx.fillEllipse(p.x, p.y, p.radius*0.8, p.radius*0.3);
      // Pre-seeded bubbles bob in place (no flicker)
      for (const bb of p.bubbles) {
        const bob = Math.sin(time*0.005 + bb.ph) * 1.5;
        p.gfx.fillStyle(0xb0ffb0, 0.6 * fade); p.gfx.fillCircle(p.x + bb.ox, p.y + bb.oy + bob, bb.r);
      }
    }

    // Particles
    for (let i = this.particles.length-1; i >= 0; i--) {
      const p = this.particles[i];
      p.obj.x+=p.vx*dt; p.obj.y+=p.vy*dt; p.life-=dt;
      p.obj.setAlpha(Math.max(0,p.life*2));
      if (p.life<=0) { p.obj.destroy(); this.particles.splice(i,1); }
    }

    // Wave complete
    if (this.waveActive && this.enemiesRemaining <= 0) {
      this.waveActive = false;
      this.enemies.clear(true, true);
      this.time.delayedCall(1500, () => this.startWave());
    }
  }
}

// ════════════════════════════════════════════════════════════
//  LEVEL UP (on death — stats + class mastery)
// ════════════════════════════════════════════════════════════
class LevelUpScene extends Phaser.Scene {
  constructor() { super('LevelUpScene'); }
  init(data) { this.deathData = data; }

  create() {
    this.add.rectangle(W/2,H/2,W,H,0x0a0806);
    const border = this.add.graphics(); border.lineStyle(2,PAL.gold,0.3); border.strokeRect(10,10,W-20,H-20);

    this.add.text(W/2,28,'You Have Fallen',{fontSize:'20px',fontFamily:'serif',color:'#8b1a1a',fontStyle:'italic'}).setOrigin(0.5);

    this.pointsText = this.add.text(W/2,52,`Points: ${PLAYER.statPoints}`,{fontSize:'14px',fontFamily:'serif',color:PAL.text}).setOrigin(0.5);

    // ── STATS SECTION ──
    this.add.text(W/2,72,'— Attributes —',{fontSize:'12px',fontFamily:'serif',color:PAL.accent,fontStyle:'italic'}).setOrigin(0.5);
    const statKeys = ['fort','might','agil','haste','armor','per','luk'];
    this.btns = [];

    statKeys.forEach((key, i) => {
      const y = 90 + i * 32;
      const info = STAT_INFO[key];
      const accent = CLASSES[PLAYER.classKey].accent;
      this.add.text(30,y,info.name,{fontSize:'12px',fontFamily:'serif',color:accent});
      this.add.text(30,y+13,info.desc,{fontSize:'8px',fontFamily:'serif',color:PAL.textDim,fontStyle:'italic'});
      const vt = this.add.text(320,y,`${PLAYER.stats[key]}`,{fontSize:'14px',fontFamily:'serif',color:PAL.text});
      const btn = this.add.text(370,y-1,'[ + ]',{fontSize:'14px',fontFamily:'serif',color:'#6b8e23'}).setInteractive({useHandCursor:true});
      this.btns.push(btn);
      btn.on('pointerover',()=>btn.setColor('#8fbc3a')); btn.on('pointerout',()=>btn.setColor('#6b8e23'));
      btn.on('pointerdown',()=>{
        if (PLAYER.statPoints<=0) return;
        PLAYER.stats[key]++; PLAYER.statPoints--;
        vt.setText(`${PLAYER.stats[key]}`); this.pointsText.setText(`Points: ${PLAYER.statPoints}`);
        if (PLAYER.statPoints<=0) this.showContinue();
      });
    });

    // ── CLASS MASTERY SECTION ──
    this.add.text(W/2,310,'— Class Mastery —',{fontSize:'12px',fontFamily:'serif',color:PAL.accent,fontStyle:'italic'}).setOrigin(0.5);
    this.add.text(W/2,326,'Spend points to unlock & strengthen specials',{fontSize:'9px',fontFamily:'serif',color:PAL.textDim,fontStyle:'italic'}).setOrigin(0.5);

    const specKeys = ['ranger','knight','mage','cleric'];
    specKeys.forEach((key, i) => {
      const y = 346 + i * 58;
      const spec = CLASS_SPECS[key];
      const lv = getSpecLevel(key);
      const maxLv = spec.levels.length;

      this.add.text(30,y,spec.name,{fontSize:'12px',fontFamily:'serif',color:spec.accent});
      this.add.text(30,y+15,`${spec.special}: ${spec.desc}`,{fontSize:'9px',fontFamily:'serif',color:PAL.textDim,fontStyle:'italic'});
      const lvText = this.add.text(30,y+28,lv > 0 ? `Level ${lv}/${maxLv}` : 'Locked',{fontSize:'9px',fontFamily:'serif',color:lv>0?'#aaa':'#555'});

      const vt = this.add.text(320,y,`${lv}`,{fontSize:'15px',fontFamily:'serif',color:PAL.text});
      const canLevel = lv < maxLv;
      const btn = this.add.text(370,y-2,canLevel ? '[ + ]' : 'MAX',{
        fontSize:'15px',fontFamily:'serif',color:canLevel?'#6b8e23':'#555'
      });
      if (canLevel) {
        btn.setInteractive({useHandCursor:true});
        this.btns.push(btn);
        btn.on('pointerover',()=>btn.setColor('#8fbc3a')); btn.on('pointerout',()=>btn.setColor('#6b8e23'));
        btn.on('pointerdown',()=>{
          if (PLAYER.statPoints<=0) return;
          PLAYER.classSpecs[key]++;
          PLAYER.statPoints--;
          const newLv = PLAYER.classSpecs[key];
          vt.setText(`${newLv}`);
          lvText.setText(`Level ${newLv}/${maxLv}`).setColor('#aaa');
          this.pointsText.setText(`Points: ${PLAYER.statPoints}`);

          // Auto-equip if first spec unlocked
          if (newLv === 1 && !PLAYER.activeSpecial) PLAYER.activeSpecial = key;
          // If they had no active or it was null, set it
          if (!PLAYER.activeSpecial) PLAYER.activeSpecial = key;

          if (newLv >= maxLv) { btn.setText('MAX').setColor('#555').disableInteractive(); }
          if (PLAYER.statPoints<=0) this.showContinue();
        });
      }
    });

    // Special selector hint
    const unlocked = getUnlockedSpecs();
    if (unlocked.length > 1) {
      this.add.text(W/2, 582, `Active special: ${CLASS_SPECS[PLAYER.activeSpecial]?.special || 'None'} — press Tab in-game to swap`,{
        fontSize:'9px',fontFamily:'serif',color:'#5a5040',fontStyle:'italic'
      }).setOrigin(0.5);
    }
  }

  showContinue() {
    this.btns.forEach(b => { b.setColor('#3a3a2a'); b.disableInteractive(); });
    const btn = this.add.text(W/2,H-50,'— View Results —',{fontSize:'18px',fontFamily:'serif',color:PAL.accent,fontStyle:'italic'}).setOrigin(0.5).setInteractive({useHandCursor:true});
    btn.on('pointerover',()=>btn.setColor('#ffe8a0')); btn.on('pointerout',()=>btn.setColor(PAL.accent));
    btn.on('pointerdown',()=>{ SaveManager.save(); this.scene.start('GameOverScene',this.deathData); });
    this.tweens.add({targets:btn,alpha:0.4,duration:700,yoyo:true,repeat:-1});
  }
}

// ════════════════════════════════════════════════════════════
//  GAME OVER
// ════════════════════════════════════════════════════════════
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOverScene'); }
  init(data) { this.finalWave = data.wave||0; this.finalKills = data.kills||0; }

  create() {
    this.add.rectangle(W/2,H/2,W,H,0x0a0806);
    const splat = this.add.graphics(); splat.fillStyle(PAL.blood,0.15);
    for (let i=0;i<8;i++) splat.fillCircle(Phaser.Math.Between(50,W-50),Phaser.Math.Between(50,H-50),Phaser.Math.Between(20,60));

    this.add.text(W/2,60,'The Keep Has Fallen',{fontSize:'28px',fontFamily:'serif',color:'#8b1a1a',stroke:'#2a0808',strokeThickness:3,fontStyle:'italic'}).setOrigin(0.5);
    const accent = CLASSES[PLAYER.classKey].accent;
    const line = this.add.graphics(); line.lineStyle(1,PAL.gold,0.3); line.moveTo(80,95); line.lineTo(W-80,95); line.strokePath();

    const stats = [['Class',PLAYER.className],['Level',`${PLAYER.level}`],['Waves',`${this.finalWave-1}`],['Kills This Run',`${this.finalKills}`],['Career Kills',`${PLAYER.totalKills}`],['Runs',`${PLAYER.runs}`]];
    stats.forEach(([l,v],i)=>{
      const y=115+i*32;
      this.add.text(80,y,l,{fontSize:'13px',fontFamily:'serif',color:PAL.textDim,fontStyle:'italic'});
      this.add.text(W-80,y,v,{fontSize:'13px',fontFamily:'serif',color:accent}).setOrigin(1,0);
    });

    // Attributes
    const line2 = this.add.graphics(); line2.lineStyle(1,PAL.gold,0.2); line2.moveTo(80,315); line2.lineTo(W-80,315); line2.strokePath();
    this.add.text(W/2,325,'— Attributes —',{fontSize:'11px',fontFamily:'serif',color:'#5a5040',fontStyle:'italic'}).setOrigin(0.5);
    ['fort','might','agil','haste','armor','per','luk'].forEach((key,i)=>{
      const y=343+i*16;
      this.add.text(100,y,STAT_INFO[key].name,{fontSize:'11px',fontFamily:'serif',color:PAL.textDim});
      this.add.text(W-100,y,`${PLAYER.stats[key] || 0}`,{fontSize:'11px',fontFamily:'serif',color:accent}).setOrigin(1,0);
    });

    // Masteries
    this.add.text(W/2,463,'— Masteries —',{fontSize:'11px',fontFamily:'serif',color:'#5a5040',fontStyle:'italic'}).setOrigin(0.5);
    const specKeys = ['ranger','knight','mage','cleric'];
    specKeys.forEach((key,i)=>{
      const y=483+i*20, lv=getSpecLevel(key);
      if (lv>0) {
        this.add.text(100,y,`${CLASS_SPECS[key].special}`,{fontSize:'11px',fontFamily:'serif',color:CLASS_SPECS[key].accent});
        this.add.text(W-100,y,`Lv ${lv}`,{fontSize:'11px',fontFamily:'serif',color:CLASS_SPECS[key].accent}).setOrigin(1,0);
      } else {
        this.add.text(100,y,CLASSES[key].name,{fontSize:'11px',fontFamily:'serif',color:'#3a3020'});
        this.add.text(W-100,y,'—',{fontSize:'11px',fontFamily:'serif',color:'#3a3020'}).setOrigin(1,0);
      }
    });

    // Buttons
    const retry = this.add.text(W/2,H-110,'— Fight Again —',{fontSize:'20px',fontFamily:'serif',color:PAL.accent,fontStyle:'italic'}).setOrigin(0.5).setInteractive({useHandCursor:true});
    retry.on('pointerover',()=>retry.setColor('#ffe8a0')); retry.on('pointerout',()=>retry.setColor(PAL.accent));
    retry.on('pointerdown',()=>this.scene.start('GameScene'));
    this.add.text(W/2,H-82,'Keep stats & specs, restart from Wave 1',{fontSize:'9px',fontFamily:'serif',color:'#5a5040',fontStyle:'italic'}).setOrigin(0.5);

    const reroll = this.add.text(W/2,H-52,'— New Character —',{fontSize:'14px',fontFamily:'serif',color:PAL.textDim,fontStyle:'italic'}).setOrigin(0.5).setInteractive({useHandCursor:true});
    reroll.on('pointerover',()=>reroll.setColor(PAL.text)); reroll.on('pointerout',()=>reroll.setColor(PAL.textDim));
    reroll.on('pointerdown',()=>{ SaveManager.clear(); this.scene.start('ClassSelectScene'); });
  }
}

// ════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════
new Phaser.Game({
  type: Phaser.AUTO, width: W, height: H, backgroundColor: '#0a0806',
  parent: document.body,
  scene: [TitleScene, ClassSelectScene, GameScene, LevelUpScene, GameOverScene],
  physics: { default: 'arcade' },
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  input: { keyboard: true }
});
</script>
